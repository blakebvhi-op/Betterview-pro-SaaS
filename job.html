<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Better View · Jobsite</title>

     to always re-fetch from the network, never serve a cached copy. Without

<style>
  :root{
    --bg:#0f1115;
    --ink:#e7ecf2;
    --muted:#7d8896;
    --line:#1f2530;
    --line2:#2a313e;
    --amber:#f59e0b;
    --green:#22c55e;
    --rose:#ef4444;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:'Inter','-apple-system','Segoe UI',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--amber);text-decoration:none}

  /* ── Page frame ──────────────────────────────────────── */
  .page{max-width:760px;margin:0 auto;padding:0 0 80px}
  .page-inner{padding:0 14px}

  /* ── PIN gate ────────────────────────────────────────── */
  .pin-gate{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:80vh;padding:24px 16px;text-align:center;
  }
  .pin-logo{font-size:32px;margin-bottom:14px}
  .pin-title{font-weight:700;font-size:20px;letter-spacing:-.01em;margin-bottom:6px}
  .pin-sub{color:var(--muted);font-size:13px;margin-bottom:28px;max-width:300px}
  .pin-input{
    width:200px;font-size:28px;letter-spacing:.5em;text-align:center;
    background:#141821;color:var(--ink);border:2px solid var(--line2);
    padding:14px 0;font-family:monospace;border-radius:8px;outline:none;
    transition:border-color .15s
  }
  .pin-input:focus{border-color:var(--amber)}
  .pin-error{color:var(--rose);font-size:13px;margin-top:14px;min-height:18px}
  .pin-btn{
    margin-top:18px;background:var(--amber);color:#0a0c10;border:0;
    padding:12px 32px;font-size:15px;font-weight:700;letter-spacing:.04em;
    border-radius:8px;cursor:pointer;font-family:inherit
  }
  .pin-btn:disabled{opacity:.4;cursor:wait}

  /* ── Top header (always visible above tabs) ─────────── */
  .top{
    border-left:3px solid var(--amber);padding:12px 14px;
    background:linear-gradient(180deg, rgba(245,158,11,.04), transparent);
    border-bottom:1px solid var(--line);margin-bottom:0
  }
  .top .stamp{
    font-size:10px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;
    font-weight:700;margin-bottom:4px
  }
  .top h1{font-size:18px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .top .meta{color:var(--muted);font-size:12px;margin-top:4px}

  /* ── Tab bar (sticky) ─────────────────────────────────── */
  .tabs{
    position:sticky;top:0;z-index:10;
    display:flex;background:#141821;border-bottom:1px solid var(--line2);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .tab{
    flex:1;min-width:80px;padding:14px 8px;text-align:center;
    background:transparent;border:0;color:var(--muted);
    font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;
    border-bottom:2px solid transparent;transition:all .15s;
    white-space:nowrap
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--amber);border-bottom-color:var(--amber);background:rgba(245,158,11,.05)}
  .tab-count{
    display:inline-block;margin-left:4px;font-size:10px;
    padding:1px 6px;border-radius:8px;background:var(--line2);color:var(--ink);
    font-weight:700
  }
  .tab.active .tab-count{background:var(--amber);color:#0a0c10}

  /* ── Tab panel ─────────────────────────────────────── */
  .tab-panel{display:none;padding-top:14px}
  .tab-panel.active{display:block}

  /* ── Cards ─────────────────────────────────────────── */
  .card{
    border:1px solid var(--line2);background:rgba(15,17,21,.6);
    padding:14px;margin-bottom:14px;border-radius:8px
  }
  .card h2{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--amber);font-weight:700;margin-bottom:10px;
    padding-bottom:6px;border-bottom:1px dashed var(--line2)
  }
  .row{display:flex;justify-content:space-between;gap:8px;padding:6px 0;font-size:13px;align-items:baseline}
  .row .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
  .row .val{text-align:right;font-weight:500;word-break:break-word}
  .row .val a{display:inline-block}
  .pill{
    display:inline-block;background:rgba(245,158,11,.1);color:var(--amber);
    padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;
    border:1px solid rgba(245,158,11,.3);margin-right:4px;margin-bottom:4px
  }
  .crew-chip{
    display:inline-block;background:#141821;color:var(--ink);
    padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;
    border:1px solid var(--line2);margin-right:4px;margin-bottom:4px
  }

  /* ── Scope / checklist (used by Overview, WO tab) ─── */
  .scope-item{
    display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);
    cursor:pointer;user-select:none;align-items:flex-start
  }
  .scope-item:last-child{border-bottom:none}
  .scope-check{
    flex-shrink:0;width:22px;height:22px;border:2px solid var(--line2);
    border-radius:4px;display:flex;align-items:center;justify-content:center;
    margin-top:1px;transition:all .15s;background:#141821
  }
  .scope-item.checked .scope-check{background:var(--green);border-color:var(--green)}
  .scope-item.checked .scope-check::after{content:'✓';color:#0a0c10;font-weight:900;font-size:14px}
  .scope-text{font-size:13px;flex:1;line-height:1.45}
  .scope-item.checked .scope-text{text-decoration:line-through;color:var(--muted)}
  .scope-divider{
    margin:14px 0 6px;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);font-weight:600
  }

  /* ── Material list ───────────────────────────────────── */
  .mat-item{
    display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);
    cursor:pointer;user-select:none;font-size:13px;align-items:center
  }
  .mat-check{
    flex-shrink:0;width:22px;height:22px;border:2px solid var(--line2);
    border-radius:4px;display:flex;align-items:center;justify-content:center;
    background:#141821;transition:all .15s
  }
  .mat-item.checked .mat-check{background:var(--blue);border-color:var(--blue)}
  .mat-item.checked .mat-check::after{content:'✓';color:#0a0c10;font-weight:900;font-size:14px}
  .mat-item.checked{opacity:.55}
  .mat-text{flex:1}

  /* ── Time clock section (placeholder for now) ───────── */
  .time-clock-section{
    border:1px dashed var(--line2);padding:20px;text-align:center;
    color:var(--muted);font-size:13px;border-radius:8px;
    background:rgba(245,158,11,.03)
  }
  .time-clock-section strong{color:var(--ink);display:block;margin-bottom:8px;font-size:15px}

  /* ── Empty state ─────────────────────────────────────── */
  .empty{
    text-align:center;color:var(--muted);font-size:13px;
    padding:40px 14px;font-style:italic
  }

  /* ── Print bar (only visible after PIN) ──────────────── */
  .print-bar{
    position:fixed;bottom:14px;right:14px;display:flex;gap:8px;z-index:5
  }
  .print-bar button{
    background:#141821;color:var(--ink);border:1px solid var(--line2);
    padding:10px 14px;font-family:inherit;font-size:12px;cursor:pointer;
    border-radius:6px;letter-spacing:.04em
  }
  .print-bar button:hover{border-color:var(--amber);color:var(--amber)}

  /* ── Print: show ALL tabs (crew gets a complete paper copy) ── */
  @media print{
    .pin-gate,.print-bar,.tabs{display:none!important}
    body{background:#fff;color:#000}
    .tab-panel{display:block!important;page-break-inside:avoid;padding-top:14px}
    .tab-panel::before{
      content:attr(data-print-label);
      display:block;font-weight:700;font-size:14px;text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;
      border-bottom:2px solid #000
    }
    .card,.top{background:#fff!important;border-color:#bbb!important}
    .scope-text,.mat-text,.row .val{color:#000}
    .row .lbl,.card h2,.top .stamp{color:#444}
    a{color:#000}
    .scope-check,.mat-check{border-color:#000}
    .scope-item.checked .scope-check,.mat-item.checked .mat-check{background:#000}
    .pill{background:#eee;color:#000;border-color:#888}
    .crew-chip{background:#fff;color:#000;border-color:#888}
  }

  .loading{padding:40px;text-align:center;color:var(--muted)}
  .error-box{padding:20px;border:1px solid var(--rose);background:rgba(239,68,68,.08);border-radius:6px;color:var(--rose);font-size:13px;margin:14px}
</style>
</head>
<body>

<!-- ─── PIN gate ─────────────────────────────────────────── -->
<div class="page" id="pageGate">
  <div class="pin-gate">
    <div class="pin-logo">🛠️</div>
    <div class="pin-title">Better View · Jobsite</div>
    <div class="pin-sub">Enter your 4-digit crew PIN to open this job.</div>
    <input class="pin-input" id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" autofocus />
    <button class="pin-btn" id="pinBtn" onclick="submitPin()">Open Job</button>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<!-- ─── Job content (hidden until PIN entered) ──────────── -->
<div class="page" id="pageContent" style="display:none">

  <!-- Header is rendered before tabs so it's always visible -->
  <div id="topHeader"></div>

  <!-- Sticky tab bar -->
  <div class="tabs">
    <button class="tab active" data-tab="overview" onclick="switchTab('overview')">📋 Overview</button>
    <button class="tab" data-tab="wo" onclick="switchTab('wo')" id="tabWo">🔧 Work Order</button>
    <button class="tab" data-tab="mo" onclick="switchTab('mo')" id="tabMo">📦 Materials</button>
    <button class="tab" data-tab="time" onclick="switchTab('time')">⏱ Time</button>
  </div>

  <!-- Tab panels (only one visible at a time on screen; all visible on print) -->
  <div class="page-inner">
    <div class="tab-panel active" data-tab="overview" data-print-label="Overview" id="panelOverview"></div>
    <div class="tab-panel" data-tab="wo" data-print-label="Work Order" id="panelWo"></div>
    <div class="tab-panel" data-tab="mo" data-print-label="Material Order" id="panelMo"></div>
    <div class="tab-panel" data-tab="time" data-print-label="Time Tracking" id="panelTime"></div>
  </div>
</div>

<!-- ─── Print bar (only visible when content showing) ── -->
<div class="print-bar" id="printBar" style="display:none">
  <button onclick="window.print()">🖨 Print</button>
</div>

<script>
const SB_URL='https://dingiuulksxqgkaivmtc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbmdpdXVsa3N4cWdrYWl2bXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTQxNTIsImV4cCI6MjA5ODQzMDE1Mn0.bo2AWF97sWc3Ezj2V1n5IS5U9pkLH-Q8Nx8iEv5KqBg';

const params=new URLSearchParams(location.search);
const JOB_ID=params.get('id');

// ── PIN gate ─────────────────────────────────────────────
const pinInput=document.getElementById('pinInput');
pinInput.addEventListener('input',()=>{
  pinInput.value=pinInput.value.replace(/[^0-9]/g,'').slice(0,4);
});
pinInput.addEventListener('keypress',e=>{
  if(e.key==='Enter') submitPin();
});

async function submitPin(){
  const pin=(pinInput.value||'').trim();
  const errEl=document.getElementById('pinError');
  const btn=document.getElementById('pinBtn');
  errEl.textContent='';
  if(!/^[0-9]{4}$/.test(pin)){
    errEl.textContent='PIN must be exactly 4 digits.';
    return;
  }
  if(!JOB_ID){
    errEl.textContent='No job specified in this link. Ask the owner to resend.';
    return;
  }
  btn.disabled=true;btn.textContent='Opening…';
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/get_job_for_crew',{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({p_job_id:JOB_ID,p_pin:pin})
    });
    if(!r.ok){
      const t=await r.text();
      throw new Error(r.status+' '+t.slice(0,120));
    }
    const data=await r.json();
    if(!data || data.ok===false){
      const code=data?.error||'unknown';
      if(code==='invalid_pin') errEl.textContent='Invalid PIN. Check with the owner.';
      else if(code==='job_not_found') errEl.textContent='Job not found. Link may be wrong.';
      else errEl.textContent='Error: '+code;
      btn.disabled=false;btn.textContent='Open Job';
      return;
    }
    sessionStorage.setItem('bvJobPin',pin);
    sessionStorage.setItem('bvJobViewer',JSON.stringify(data.viewer));
    renderAll(data);
  }catch(e){
    errEl.textContent='Network error. Try again. ('+e.message+')';
    btn.disabled=false;btn.textContent='Open Job';
  }
}

// ── Helpers ──────────────────────────────────────────────
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDay(s){
  if(!s) return '—';
  try{
    const d=new Date(s+'T00:00:00');
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }catch{return s;}
}
function safeArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  // line_items is sometimes stored as a JSON-encoded string inside a jsonb
  // column (existing data shape, see docs.line_items in templates).
  if(typeof v==='string'){
    try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch{return [];}
  }
  return [];
}

// ── Tabs ─────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===name));
  // Scroll the body up to the tab bar position on switch (so user doesn't stay
  // mid-page when they tap a tab from way down)
  window.scrollTo({top:document.querySelector('.tabs').offsetTop-1,behavior:'smooth'});
}

// ── Master render: pulls everything apart, fills each tab ─
function renderAll(data){
  document.getElementById('pageGate').style.display='none';
  document.getElementById('printBar').style.display='flex';
  document.getElementById('pageContent').style.display='block';

  const job=data.job||{};
  const docs=data.docs||[];
  const crew=data.assigned||[];
  const viewerId=data.viewer?.user_id||'anon';

  // Find linked docs. Real column names confirmed from schema:
  // - job.linked_doc_id  → primary doc (usually the estimate)
  // - job.linked_mo_id   → material order
  // - docs.source_est_id → child docs link back to parent estimate via this
  // - DOC_TYPES enum: estimate, invoice, workorder, matorder, contract, changeorder, lienwaiver
  const primaryDocId = job.linked_doc_id || null;
  const materialDocId = job.linked_mo_id || null;
  const estimate = docs.find(d=>d.id===primaryDocId && d.type==='estimate')
                || docs.find(d=>d.type==='estimate');
  const changeOrders = docs.filter(d=>d.type==='changeorder')
    .sort((a,b)=>(a.created||0)-(b.created||0));
  const materialOrder = docs.find(d=>d.id===materialDocId)
                     || docs.find(d=>d.type==='matorder');
  const workOrder = docs.find(d=>d.type==='workorder' && d.linked_job_id===job.id)
                 || docs.find(d=>d.type==='workorder');

  // ── Render the top header (always visible) ──
  renderTopHeader(job);

  // ── Render each tab's content ──
  renderOverviewTab({job,estimate,changeOrders,crew,viewerId});
  renderWorkOrderTab({job,workOrder,viewerId});
  renderMaterialTab({job,materialOrder,viewerId});
  renderTimeTab({job,viewerId});

  // ── Show counts on tab labels ──
  updateTabCounts({workOrder,materialOrder});

  window.scrollTo(0,0);
}

function renderTopHeader(job){
  const el=document.getElementById('topHeader');
  let html='<div class="top">';
  html+='<div class="stamp">JOB '+esc(job.id||'')+'</div>';
  html+='<h1>'+esc(job.title||'(untitled job)')+'</h1>';
  if(job.address){
    const mapUrl='https://maps.google.com/?q='+encodeURIComponent(job.address);
    html+='<div class="meta">📍 <a href="'+esc(mapUrl)+'" target="_blank">'+esc(job.address)+'</a></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

function updateTabCounts({workOrder,materialOrder}){
  const woTab=document.getElementById('tabWo');
  const moTab=document.getElementById('tabMo');
  if(woTab && workOrder){
    // WO items live in `checklist`, not `line_items` (line_items is always empty)
    const items=safeArr(workOrder.checklist);
    if(items.length) woTab.innerHTML='🔧 Work Order <span class="tab-count">'+items.length+'</span>';
  }
  if(moTab && materialOrder){
    // mat_order_data is a JSON-encoded string in the jsonb column — parse first
    let matData = {};
    if(typeof materialOrder.mat_order_data === 'string'){
      try{ matData = JSON.parse(materialOrder.mat_order_data) || {}; }catch{ matData = {}; }
    }else if(materialOrder.mat_order_data && typeof materialOrder.mat_order_data === 'object'){
      matData = materialOrder.mat_order_data;
    }
    const moMaterials = matData.moMaterials || materialOrder.moMaterials || {};
    const count = Object.values(moMaterials).filter(v=>
      v && typeof v==='object' && Object.values(v).some(x=>String(x||'').trim()!=='')
    ).length;
    if(count>0) moTab.innerHTML='📦 Materials <span class="tab-count">'+count+'</span>';
  }
}

// ── Tab: Overview ────────────────────────────────────────
function renderOverviewTab({job,estimate,changeOrders,crew,viewerId}){
  let html='';

  // Details card
  html+='<div class="card"><h2>Details</h2>';
  if(job.day) html+='<div class="row"><span class="lbl">Scheduled</span><span class="val">'+esc(fmtDay(job.day))+'</span></div>';
  if(job.type){
    const types=String(job.type).split(',').filter(Boolean);
    html+='<div class="row"><span class="lbl">Job Type</span><span class="val">'+types.map(t=>'<span class="pill">'+esc(t)+'</span>').join('')+'</span></div>';
  }
  if(job.note) html+='<div class="row"><span class="lbl">Notes</span><span class="val">'+esc(job.note)+'</span></div>';
  html+='</div>';

  // Crew
  if(crew.length){
    html+='<div class="card"><h2>Assigned Crew</h2>';
    html+='<div>'+crew.map(c=>'<span class="crew-chip">'+esc(c.display_name||c.role||'?')+'</span>').join('')+'</div>';
    html+='</div>';
  }

  // Customer (from estimate)
  if(estimate && (estimate.client_name || estimate.client_contact)){
    html+='<div class="card"><h2>Customer</h2>';
    if(estimate.client_name) html+='<div class="row"><span class="lbl">Name</span><span class="val">'+esc(estimate.client_name)+'</span></div>';
    if(estimate.client_contact){
      const c=estimate.client_contact;
      const phoneOnly=c.replace(/[^0-9]/g,'');
      if(phoneOnly.length>=10){
        html+='<div class="row"><span class="lbl">Contact</span><span class="val"><a href="tel:'+esc(phoneOnly)+'">'+esc(c)+'</a></span></div>';
      }else{
        html+='<div class="row"><span class="lbl">Contact</span><span class="val">'+esc(c)+'</span></div>';
      }
    }
    if(estimate.client_addr) html+='<div class="row"><span class="lbl">Address</span><span class="val">'+esc(estimate.client_addr)+'</span></div>';
    html+='</div>';
  }

  // Scope of Work (from estimate + change orders)
  const scopeSources=[];
  if(estimate) scopeSources.push({label:'Estimate',doc:estimate});
  changeOrders.forEach((co,i)=>scopeSources.push({label:'Change Order #'+(i+1),doc:co}));

  if(scopeSources.length){
    html+='<div class="card"><h2>Scope of Work</h2>';
    scopeSources.forEach(src=>{
      if(scopeSources.length>1) html+='<div class="scope-divider">'+esc(src.label)+'</div>';
      if(src.doc.scope) html+='<div style="font-size:13px;color:#bdc7d3;line-height:1.6;padding:4px 0 10px;">'+esc(src.doc.scope)+'</div>';
      const items=safeArr(src.doc.line_items);
      items.forEach((li,liIdx)=>{
        const key='scope:'+job.id+':'+viewerId+':'+src.doc.id+':'+liIdx;
        const desc=li.desc||li.description||'(no description)';
        const checked=localStorage.getItem(key)==='1';
        html+='<div class="scope-item'+(checked?' checked':'')+'" data-key="'+esc(key)+'" onclick="toggleCheck(this)">';
        html+='<div class="scope-check"></div>';
        html+='<div class="scope-text">'+esc(desc);
        if(li.qty && Number(li.qty)>0){
          html+=' <span style="color:var(--muted);font-size:11px;">(qty '+esc(li.qty)+')</span>';
        }
        html+='</div></div>';
      });
    });
    html+='</div>';
  }else{
    html+='<div class="empty">No scope of work attached to this job yet.</div>';
  }

  document.getElementById('panelOverview').innerHTML=html;
}

// ── Tab: Work Order ──────────────────────────────────────
// REAL data shape: work order checklist items live in the `checklist` column,
// NOT in `line_items` (which is always empty []). Field shape per item:
//   { desc: "...", qty: 1, cat: "labor", done: false }
// `checklist` may come back from the RPC as a JSON-encoded string OR a real
// jsonb array — safeArr handles both.
function renderWorkOrderTab({job,workOrder,viewerId}){
  if(!workOrder){
    document.getElementById('panelWo').innerHTML='<div class="empty">No work order attached to this job.<br>Ask the owner to add one.</div>';
    return;
  }
  let html='';
  html+='<div class="card"><h2>Work Order'+(workOrder.num?' · '+esc(workOrder.num):'')+'</h2>';
  if(workOrder.scope) html+='<div style="font-size:13px;color:#bdc7d3;line-height:1.6;padding:4px 0 10px;">'+esc(workOrder.scope)+'</div>';
  // checklist is where the line items live for WOs (verified via RPC inspection)
  const items=safeArr(workOrder.checklist);
  if(items.length===0 && !workOrder.scope){
    html+='<div style="color:var(--muted);font-size:13px;">No work order lines.</div>';
  }else{
    items.forEach((li,liIdx)=>{
      const key='wo:'+job.id+':'+viewerId+':'+workOrder.id+':'+liIdx;
      const desc=li.desc||li.description||'(no description)';
      const checked=localStorage.getItem(key)==='1';
      html+='<div class="scope-item'+(checked?' checked':'')+'" data-key="'+esc(key)+'" onclick="toggleCheck(this)">';
      html+='<div class="scope-check"></div>';
      html+='<div class="scope-text">'+esc(desc);
      if(li.qty && Number(li.qty)>0){
        html+=' <span style="color:var(--muted);font-size:11px;">(qty '+esc(li.qty)+')</span>';
      }
      html+='</div></div>';
    });
  }
  if(workOrder.notes){
    html+='<div style="margin-top:14px;padding-top:10px;border-top:1px dashed var(--line2);font-size:12px;color:var(--muted);">';
    html+='<strong style="color:var(--ink);display:block;margin-bottom:4px;">Notes</strong>';
    html+=esc(workOrder.notes);
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('panelWo').innerHTML=html;
}

// ── Tab: Material Order ──────────────────────────────────
// REAL data shape verified via RPC inspection:
//   - mat_order_data is stored as a JSON-ENCODED STRING in the jsonb column
//     (NOT a parsed object — this is the same quirk that bit us on templates)
//   - Once parsed, it contains: { moMaterials: {key: {s0, s1, s2}}, ... }
//   - moMaterials is the actual data we display
function renderMaterialTab({job,materialOrder,viewerId}){
  if(!materialOrder){
    document.getElementById('panelMo').innerHTML='<div class="empty">No material order attached to this job.<br>Ask the owner to add one.</div>';
    return;
  }
  let html='';
  html+='<div class="card"><h2>Material List'+(materialOrder.num?' · '+esc(materialOrder.num):'')+'</h2>';
  if(materialOrder.scope) html+='<div style="font-size:13px;color:#bdc7d3;line-height:1.6;padding:4px 0 10px;">'+esc(materialOrder.scope)+'</div>';

  // Parse mat_order_data — it's stored as a JSON-encoded string in the
  // jsonb column. Falls back to top-level moMaterials in case future docs
  // adopt a flatter shape.
  let matData = {};
  if(typeof materialOrder.mat_order_data === 'string'){
    try{ matData = JSON.parse(materialOrder.mat_order_data) || {}; }catch{ matData = {}; }
  }else if(materialOrder.mat_order_data && typeof materialOrder.mat_order_data === 'object'){
    matData = materialOrder.mat_order_data;
  }
  const moMaterials = matData.moMaterials || materialOrder.moMaterials || {};

  // Build the list: only rows with at least one non-empty slot
  const matRows = Object.entries(moMaterials)
    .map(([key,v])=>{
      if(!v || typeof v!=='object') return null;
      const slots = Object.entries(v)
        .filter(([k,val])=>String(val||'').trim()!=='')
        .sort(([a],[b])=>a.localeCompare(b)) // s0, s1, s2...
        .map(([,val])=>String(val).trim());
      if(slots.length===0) return null;
      return {key,slots};
    })
    .filter(Boolean);

  if(matRows.length===0){
    html+='<div style="color:var(--muted);font-size:13px;">No material lines.</div>';
  }else{
    matRows.forEach(row=>{
      const key='mat:'+job.id+':'+viewerId+':'+materialOrder.id+':'+row.key;
      const checked=localStorage.getItem(key)==='1';
      const friendlyKey=row.key
        .replace(/_/g,' ')
        .replace(/\b\w/g,c=>c.toUpperCase());
      html+='<div class="mat-item'+(checked?' checked':'')+'" data-key="'+esc(key)+'" onclick="toggleCheck(this)">';
      html+='<div class="mat-check"></div>';
      html+='<div class="mat-text"><strong>'+esc(friendlyKey)+':</strong> '+esc(row.slots.join(' · '))+'</div>';
      html+='</div>';
    });
  }
  if(materialOrder.notes){
    html+='<div style="margin-top:14px;padding-top:10px;border-top:1px dashed var(--line2);font-size:12px;color:var(--muted);">';
    html+='<strong style="color:var(--ink);display:block;margin-bottom:4px;">Notes</strong>';
    html+=esc(materialOrder.notes);
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('panelMo').innerHTML=html;
}

// ── Tab: Time (real clock-in/out, via SECURITY DEFINER functions) ─
// Anonymous writes are gated by the crew PIN — same trust model as the
// rest of the crew page. The PIN is sent on every clock-in/out request
// and validated server-side. RPC functions:
//   crew_clock_in(p_pin, p_job_id)
//   crew_clock_out(p_pin, p_entry_id)
//   crew_get_my_entries(p_pin, p_job_id)
//
// Behavior:
//   - Clock In auto-clocks-out any other open entry (job switching)
//   - Open entries on a different job show as a warning banner
//   - Today's entries on THIS job render as a list with durations
//   - Live ticking timer + tab badge update every second when clocked in

let timeState = {
  jobId: null,
  pin: null,
  myEntries: [],          // entries on THIS job (last 30 days)
  openHere: null,          // currently-open entry on this job
  openElsewhere: null,     // currently-open entry on a different job
  tickInterval: null,      // setInterval id
};

function renderTimeTab({job,viewerId}){
  timeState.jobId = job.id;
  timeState.pin = sessionStorage.getItem('bvJobPin') || '';
  // Initial paint
  document.getElementById('panelTime').innerHTML=`
    <div class="card"><h2>Time Tracking</h2>
      <div id="timeBody"><div class="loading">Loading…</div></div>
    </div>`;
  // Fetch entries + render
  refreshTimeEntries();
}

async function refreshTimeEntries(){
  if(!timeState.pin || !timeState.jobId) return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/crew_get_my_entries',{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({p_pin:timeState.pin, p_job_id:timeState.jobId})
    });
    if(!r.ok){
      document.getElementById('timeBody').innerHTML='<div class="error-box">Failed to load time entries. '+r.status+'</div>';
      return;
    }
    const data=await r.json();
    if(!data.ok){
      document.getElementById('timeBody').innerHTML='<div class="error-box">'+esc(data.error||'unknown error')+'</div>';
      return;
    }
    timeState.myEntries = data.entries || [];
    timeState.openHere = timeState.myEntries.find(e=>!e.clock_out) || null;
    timeState.openElsewhere = data.open_other || null;
    renderTimePanel();
    // Start or stop the live tick depending on whether we're clocked in here
    if(timeState.openHere) startTimeTicker(); else stopTimeTicker();
  }catch(e){
    document.getElementById('timeBody').innerHTML='<div class="error-box">Error: '+esc(e.message||e)+'</div>';
  }
}

function renderTimePanel(){
  const body=document.getElementById('timeBody');
  if(!body) return;
  let html='';

  // Warning if clocked in to a different job
  if(timeState.openElsewhere){
    const o=timeState.openElsewhere;
    const since=new Date(o.clock_in).toLocaleString('en-US',{
      hour:'numeric',minute:'2-digit',hour12:true,
      month:'short',day:'numeric'
    });
    html+='<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--amber);">';
    html+='<strong>⚠ You\'re already on the clock</strong><br>';
    html+='<span style="color:#cfd6e0;">Started '+esc(since)+(o.job_id?' on a different job':' (no job)')+'. Clocking in here will switch you.</span>';
    html+='</div>';
  }

  // Main Clock button
  if(timeState.openHere){
    const since=new Date(timeState.openHere.clock_in);
    html+='<div style="text-align:center;padding:14px 0;">';
    html+='<div style="font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;">Clocked in since</div>';
    html+='<div style="font-size:14px;color:var(--ink);margin-bottom:4px;">'+esc(fmtTimeOfDay(since))+'</div>';
    html+='<div id="timeLiveTimer" style="font-size:32px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:.04em;margin-bottom:14px;">'+fmtDuration(Date.now()-since.getTime())+'</div>';
    html+='<button class="pin-btn" style="background:var(--rose);color:#fff;" onclick="doClockOut()">⏹ Clock Out</button>';
    html+='</div>';
  }else{
    html+='<div style="text-align:center;padding:14px 0;">';
    html+='<div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Not currently clocked in to this job.</div>';
    html+='<button class="pin-btn" onclick="doClockIn()">⏱ Clock In</button>';
    html+='</div>';
  }

  // Today's / recent entries list (only completed ones, plus the current open one already shown above)
  const past = timeState.myEntries.filter(e=>e.clock_out);
  if(past.length>0){
    html+='<div style="margin-top:18px;border-top:1px solid var(--line2);padding-top:14px;">';
    html+='<div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600;">Recent entries (this job)</div>';
    past.slice(0,20).forEach(e=>{
      const ci=new Date(e.clock_in), co=new Date(e.clock_out);
      const dur=fmtDuration(co.getTime()-ci.getTime());
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;">';
      html+='<span>'+esc(fmtDateShort(ci))+' · '+esc(fmtTimeOfDay(ci))+' → '+esc(fmtTimeOfDay(co))+'</span>';
      html+='<span style="color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;">'+esc(dur)+'</span>';
      html+='</div>';
    });
    html+='</div>';
  }

  body.innerHTML=html;
  updateTimeTabBadge();
}

// Live timer tick — updates the visible timer AND the tab badge every second
function startTimeTicker(){
  stopTimeTicker(); // ensure no duplicate timers
  timeState.tickInterval = setInterval(()=>{
    if(!timeState.openHere){ stopTimeTicker(); return; }
    const elapsed = Date.now() - new Date(timeState.openHere.clock_in).getTime();
    const liveEl = document.getElementById('timeLiveTimer');
    if(liveEl) liveEl.textContent = fmtDuration(elapsed);
    updateTimeTabBadge();
  }, 1000);
}
function stopTimeTicker(){
  if(timeState.tickInterval){
    clearInterval(timeState.tickInterval);
    timeState.tickInterval = null;
  }
}

// Show live elapsed time on the Time tab label so the crew member can see
// they're on the clock even when looking at other tabs.
function updateTimeTabBadge(){
  const tab = document.querySelector('.tab[data-tab="time"]');
  if(!tab) return;
  if(timeState.openHere){
    const elapsed = Date.now() - new Date(timeState.openHere.clock_in).getTime();
    tab.innerHTML = '⏱ Time <span class="tab-count" style="background:var(--green);color:#0a0c10;">'+fmtDurationShort(elapsed)+'</span>';
  }else{
    tab.innerHTML = '⏱ Time';
  }
}

// ── GPS helper ────────────────────────────────────────────────────
// Promise-based wrapper around navigator.geolocation. Resolves with
// {lat, lng} or rejects with a human-readable reason. Times out after
// 10 seconds (urban areas usually resolve in <2s, rural can be 5-8s).
// We use enableHighAccuracy=true because we're tracking jobsite location,
// not browsing — 30s of GPS warm-up is acceptable here.
function getCrewLocation(){
  return new Promise((resolve, reject)=>{
    if(!navigator.geolocation){
      reject(new Error('This device does not support location services.'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy
      }),
      err => {
        // Map browser error codes to human messages
        if(err.code === 1){
          reject(new Error('Location permission denied. Tap the lock icon in your address bar → Permissions → Location → Allow, then try again.'));
        } else if(err.code === 2){
          reject(new Error('Could not determine location. Try moving outside or near a window for better GPS signal.'));
        } else if(err.code === 3){
          reject(new Error('Location request timed out. Check that GPS is on and try again.'));
        } else {
          reject(new Error('Location error: '+(err.message||'unknown')));
        }
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 30000  // accept a recent cached fix (under 30s old)
      }
    );
  });
}

async function doClockIn(){
  if(!timeState.pin || !timeState.jobId) return;
  const btn = document.querySelector('#panelTime .pin-btn');
  if(btn){ btn.disabled=true; btn.textContent='Getting location…'; }

  // Step 1: get GPS BEFORE attempting clock-in. Per spec, GPS is required.
  // If permission is denied, we block clock-in entirely and tell the crew
  // member how to fix it.
  let coords;
  try{
    coords = await getCrewLocation();
  }catch(e){
    alert('Cannot clock in — '+e.message);
    if(btn){ btn.disabled=false; btn.textContent='⏱ Clock In'; }
    return;
  }

  if(btn){ btn.textContent='Clocking in…'; }
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/crew_clock_in',{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({
        p_pin:timeState.pin,
        p_job_id:timeState.jobId,
        p_lat:coords.lat,
        p_lng:coords.lng
      })
    });
    if(!r.ok){
      const t=await r.text();
      alert('Clock in failed: '+r.status+' '+t.slice(0,160));
      if(btn){ btn.disabled=false; btn.textContent='⏱ Clock In'; }
      return;
    }
    const data=await r.json();
    if(!data.ok){
      alert('Clock in failed: '+(data.error||'unknown'));
      if(btn){ btn.disabled=false; btn.textContent='⏱ Clock In'; }
      return;
    }
    // Refresh from server so we have the canonical entry list
    await refreshTimeEntries();
  }catch(e){
    alert('Network error: '+e.message);
    if(btn){ btn.disabled=false; btn.textContent='⏱ Clock In'; }
  }
}

async function doClockOut(){
  if(!timeState.pin || !timeState.openHere) return;
  const btn = document.querySelector('#panelTime .pin-btn');
  if(btn){ btn.disabled=true; btn.textContent='Getting location…'; }

  // Same GPS-required policy on clock-out. Without this we'd have asymmetric
  // data: a clock-in location but no clock-out location, which makes the
  // "where was the crew" audit story incomplete.
  let coords;
  try{
    coords = await getCrewLocation();
  }catch(e){
    alert('Cannot clock out — '+e.message);
    if(btn){ btn.disabled=false; btn.textContent='⏹ Clock Out'; }
    return;
  }

  if(btn){ btn.textContent='Clocking out…'; }
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/crew_clock_out',{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({
        p_pin:timeState.pin,
        p_entry_id:timeState.openHere.id,
        p_lat:coords.lat,
        p_lng:coords.lng
      })
    });
    if(!r.ok){
      const t=await r.text();
      alert('Clock out failed: '+r.status+' '+t.slice(0,160));
      if(btn){ btn.disabled=false; btn.textContent='⏹ Clock Out'; }
      return;
    }
    const data=await r.json();
    if(!data.ok){
      alert('Clock out failed: '+(data.error||'unknown'));
      if(btn){ btn.disabled=false; btn.textContent='⏹ Clock Out'; }
      return;
    }
    await refreshTimeEntries();
  }catch(e){
    alert('Network error: '+e.message);
    if(btn){ btn.disabled=false; btn.textContent='⏹ Clock Out'; }
  }
}

// ── Time formatting helpers ──────────────────────────────────────
function fmtDuration(ms){
  if(!ms || ms<0) return '0:00:00';
  const total = Math.floor(ms/1000);
  const h = Math.floor(total/3600);
  const m = Math.floor((total%3600)/60);
  const s = total%60;
  return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtDurationShort(ms){
  if(!ms || ms<0) return '0:00';
  const total = Math.floor(ms/60000);
  const h = Math.floor(total/60);
  const m = total%60;
  return h+':'+String(m).padStart(2,'0');
}
function fmtTimeOfDay(d){
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtDateShort(d){
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── Generic check toggle (used by both scope-items and mat-items) ──
function toggleCheck(el){
  const key=el.dataset.key;
  if(el.classList.contains('checked')){
    el.classList.remove('checked');
    localStorage.removeItem(key);
  }else{
    el.classList.add('checked');
    localStorage.setItem(key,'1');
  }
}

// ── Auto-auth if session already has a PIN ──
(function tryAutoAuth(){
  const savedPin=sessionStorage.getItem('bvJobPin');
  if(savedPin && /^[0-9]{4}$/.test(savedPin)){
    pinInput.value=savedPin;
    submitPin();
  }
})();
