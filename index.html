<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetterView Pro</title>
  <!-- Redirect the site root to the app. Relative path, so it works at any
       subpath (e.g. /Betterview-pro-SaaS/) without hardcoding the repo name. -->
  <meta http-equiv="refresh" content="0; url=app.html">
  <link rel="canonical" href="app.html">
  <script>
    // Instant JS redirect (fires before the meta refresh in practice).
    // Uses a relative URL so it's correct regardless of the Pages subpath.
    window.location.replace('app.html');
  </script>
</head>
<body style="font-family:system-ui,sans-serif;background:#f8fafc;color:#082850;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <p>Loading BetterView Pro… If you are not redirected, <a href="app.html" style="color:#10a8b0;">click here</a>.</p>
</body>
</html>
