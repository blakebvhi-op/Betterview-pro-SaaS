<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Estimate — Better View Home Improvements</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--amber:#f59e0b;--ink:#1a1e2e;--steel:#475569;--mute:#94a3b8;--bg:#f1f5f9;--green:#22c55e;--danger:#ef4444;}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:18px 12px 60px;line-height:1.4;}
.wrap{max-width:820px;margin:0 auto;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.08);overflow:hidden;}
.loader{padding:80px 20px;text-align:center;color:var(--mute);}
.loader-spin{display:inline-block;width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:var(--amber);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{padding:60px 24px;text-align:center;}
.err-emoji{font-size:48px;margin-bottom:12px;}
.err-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.err-msg{color:var(--steel);font-size:14px;}

/* Verify gate */
.gate{padding:40px 24px;text-align:center;}
.gate h1{font-size:22px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
.gate p{color:var(--steel);font-size:14px;margin-bottom:18px;}
.gate-input{width:100%;max-width:360px;padding:14px 14px;font-size:16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s;}
.gate-input:focus{border-color:var(--amber);}
.gate-input.err{border-color:var(--danger);}
.gate-btn{margin-top:12px;width:100%;max-width:360px;padding:14px;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;border-radius:10px;background:var(--ink);color:#fff;cursor:pointer;}
.gate-btn:hover{background:#334155;}
.gate-err{margin-top:10px;color:var(--danger);font-size:13px;font-weight:600;}

/* Header */
.head{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 28px 18px;border-bottom:3px solid var(--amber);flex-wrap:wrap;gap:12px;}
.company{flex:1;min-width:200px;}
.company-name{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink);line-height:1.1;}
.company-tag{font-size:10px;color:var(--steel);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.company-meta{font-size:11px;color:var(--steel);margin-top:6px;line-height:1.5;}
.doc-info{text-align:right;}
.doc-type{font-size:20px;font-weight:800;letter-spacing:3px;color:var(--amber);text-transform:uppercase;}
.doc-num,.doc-date{font-size:11px;color:var(--steel);margin-top:2px;}

/* Body */
.body{padding:18px 28px 28px;}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
@media(max-width:560px){.parties{grid-template-columns:1fr;}.head{padding:18px 16px 14px;}.body{padding:14px 16px 18px;}.doc-info{text-align:left;width:100%;}}
.party-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.party-name{font-weight:700;font-size:14px;}
.party-detail{font-size:12px;color:var(--steel);line-height:1.6;margin-top:2px;}
.scope{margin-bottom:16px;background:#fffbeb;border-left:3px solid var(--amber);padding:12px 14px;border-radius:0 6px 6px 0;}
.scope-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.scope-text{font-size:12px;color:var(--steel);line-height:1.6;white-space:pre-wrap;}
table{width:100%;border-collapse:collapse;margin-bottom:18px;font-size:13px;}
th{background:#f1f5f9;padding:9px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#64748b;text-align:left;border-bottom:1px solid #e2e8f0;}
th:nth-child(2){text-align:center;}th:nth-child(3),th:nth-child(4){text-align:right;}
td{padding:10px;border-bottom:1px solid #f1f5f9;color:var(--steel);}
td:nth-child(2){text-align:center;}td:nth-child(3),td:nth-child(4){text-align:right;}
tr.row-zero td{color:#94a3b8;font-style:italic;}
tr.row-zero td:nth-child(2),tr.row-zero td:nth-child(3),tr.row-zero td:nth-child(4){font-style:normal;}
.totals{display:flex;justify-content:flex-end;margin-bottom:18px;padding-top:12px;border-top:2px solid var(--ink);}
.total-row{display:flex;gap:24px;font-size:18px;font-weight:800;}
.total-lbl{color:var(--steel);}
.notes{background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:16px;}
.notes-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.notes-text{font-size:11px;color:var(--steel);line-height:1.6;white-space:pre-wrap;}

/* Already-signed badge */
.signed-banner{background:#dcfce7;border:1px solid #22c55e;color:#15803d;padding:14px 16px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.signed-banner-icon{font-size:24px;}
.signed-banner-msg{flex:1;}
.signed-banner-title{font-weight:700;font-size:14px;margin-bottom:2px;}
.signed-banner-detail{font-size:12px;}

/* Signature section */
.sig-section{background:#fef3c7;border:2px solid var(--amber);border-radius:10px;padding:16px;margin-bottom:16px;}
.sig-section h2{font-size:14px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:8px;}
.sig-section p{font-size:12px;color:var(--steel);margin-bottom:10px;}
.sig-canvas{width:100%;height:160px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;cursor:crosshair;touch-action:none;display:block;}
.sig-canvas.signed{border-color:var(--green);}
.sig-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.sig-name-input{flex:1;min-width:200px;padding:10px;font-size:14px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:var(--ink);outline:none;}
.sig-name-input:focus{border-color:var(--amber);}
.sig-btn{padding:10px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.sig-btn-clear{background:#fff;border:1px solid #cbd5e1;color:var(--steel);}
.sig-btn-clear:hover{background:#f1f5f9;}
.sig-btn-save{background:var(--green);color:#fff;}
.sig-btn-save:hover{background:#16a34a;}
.sig-btn-save:disabled{opacity:.5;cursor:not-allowed;}
.sig-status{margin-top:8px;font-size:12px;font-weight:600;}
.sig-status.ok{color:var(--green);}
.sig-status.err{color:var(--danger);}

/* Signed-display embedded in printed view */
.embedded-sig{margin-bottom:16px;padding-top:12px;border-top:1px solid #e2e8f0;}
.embedded-sig-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:6px;}
.embedded-sig-row{display:flex;align-items:flex-end;gap:14px;}
.embedded-sig-img{max-height:70px;max-width:260px;border-bottom:1px solid var(--ink);padding:4px 6px;}
.embedded-sig-name{font-size:13px;font-weight:600;color:var(--ink);}
.embedded-sig-date{font-size:10px;color:var(--mute);margin-top:2px;}

/* Bottom action bar */
.actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;}
.action-btn{flex:1;min-width:180px;padding:14px 18px;border:none;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.action-btn-print{background:var(--ink);color:#fff;}
.action-btn-print:hover{background:#334155;}

.footer{text-align:center;font-size:10px;color:var(--mute);padding:16px 24px;border-top:1px solid #e2e8f0;}

@media print{
  body{background:#fff;padding:0;}
  .wrap{box-shadow:none;border-radius:0;}
  .sig-section,.actions,.gate{display:none !important;}
}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loader"><div class="loader-spin"></div><div style="margin-top:14px;font-size:13px;">Loading estimate…</div></div>
</div>

<script>
const SB_URL='https://dingiuulksxqgkaivmtc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbmdpdXVsa3N4cWdrYWl2bXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTQxNTIsImV4cCI6MjA5ODQzMDE1Mn0.bo2AWF97sWc3Ezj2V1n5IS5U9pkLH-Q8Nx8iEv5KqBg';

const COMPANY={name:'Better View Home Improvements',tagline:'Roofing · Siding · Gutters',phone:'(414) 916-9450',email:'office@betterviewhi.com',address:'Menomonee Falls, Wisconsin',license:'WI Lic. #1452050',website:'betterviewhi.com'};

const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=v=>'$'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

function getDocId(){
  const u=new URL(window.location.href);
  return u.searchParams.get('id')||u.searchParams.get('est')||'';
}

function calcTotal(d){
  const items=d.lineItems||[];
  const sub=items.reduce((s,li)=>s+(parseFloat(li.qty)||0)*(parseFloat(li.price)||0),0);
  if(d.manualTotal!=null&&d.manualTotal!==''&&!isNaN(parseFloat(d.manualTotal))) return parseFloat(d.manualTotal);
  return sub;
}

function showError(title,msg){
  document.getElementById('wrap').innerHTML=`<div class="err"><div class="err-emoji">📄</div><div class="err-title">${esc(title)}</div><div class="err-msg">${esc(msg)}</div></div>`;
}

async function loadDoc(){
  const id=getDocId();
  if(!id){showError('No estimate ID','This link is missing an estimate ID. Ask the sender to resend.');return;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/docs?id=eq.${encodeURIComponent(id)}&select=*`,{
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const arr=await r.json();
    if(!arr.length){showError('Estimate not found','This estimate may have been deleted, or the link is incorrect.');return;}
    const row=arr[0];
    return {
      id:row.id,type:row.type||'estimate',num:row.num||'',status:row.status||'draft',
      clientName:row.client_name||'',clientContact:row.client_contact||'',clientAddr:row.client_addr||'',
      date:row.date||'',dueDate:row.due_date||'',scope:row.scope||'',
      lineItems:(()=>{try{return typeof row.line_items==='string'?JSON.parse(row.line_items):(row.line_items||[]);}catch{return [];}})(),
      tax:row.tax||0,discount:row.discount||0,notes:row.notes||'',manualTotal:row.manual_total||'',
      signature:row.signature||'',signatureName:row.signature_name||'',signatureDate:row.signature_date||'',
    };
  }catch(e){
    console.error(e);
    showError('Could not load estimate','Check your internet connection or ask the sender to resend the link.');
    return null;
  }
}

// Phone normalization for matching: strip everything but digits
function normPhone(s){return String(s||'').replace(/\D/g,'');}
function normEmail(s){return String(s||'').trim().toLowerCase();}

function showGate(d){
  // Build a verify gate: customer must enter the phone OR email associated with the estimate
  const hasPhone=!!normPhone(d.clientContact).length||!!normPhone(extractPhone(d));
  const hasEmail=!!normEmail(extractEmail(d));
  let promptText='To view this estimate, please verify your identity.';
  if(hasPhone&&hasEmail) promptText='Enter the phone number OR email address this estimate was sent to.';
  else if(hasPhone) promptText='Enter the phone number this estimate was sent to.';
  else if(hasEmail) promptText='Enter the email address this estimate was sent to.';
  else promptText='Please confirm your name to view this estimate.';
  document.getElementById('wrap').innerHTML=`<div class="gate">
    <h1>Verify Identity</h1>
    <p>${esc(promptText)}</p>
    <input class="gate-input" id="gateInput" autocomplete="off" placeholder="${hasEmail&&!hasPhone?'name@example.com':hasPhone?'Phone or email':'Your full name'}" inputmode="${hasPhone&&!hasEmail?'tel':'text'}"/>
    <button class="gate-btn" id="gateBtn">Continue →</button>
    <div class="gate-err" id="gateErr"></div>
  </div>`;
  const inp=document.getElementById('gateInput');
  const btn=document.getElementById('gateBtn');
  const errEl=document.getElementById('gateErr');
  inp.focus();
  const submit=()=>{
    const v=(inp.value||'').trim();
    if(!v){errEl.textContent='Please enter your phone or email.';inp.classList.add('err');return;}
    const vDigits=normPhone(v);
    const vEmail=normEmail(v);
    const matchPhone=hasPhone&&vDigits.length>=7&&(normPhone(d.clientContact).endsWith(vDigits.slice(-10))||normPhone(extractPhone(d)).endsWith(vDigits.slice(-10)));
    const matchEmail=hasEmail&&vEmail.length>3&&normEmail(extractEmail(d))===vEmail;
    const matchName=!hasPhone&&!hasEmail&&v.length>=3&&d.clientName&&d.clientName.toLowerCase().includes(v.toLowerCase().slice(0,Math.min(v.length,d.clientName.length)));
    if(matchPhone||matchEmail||matchName){
      sessionStorage.setItem('bvp_verified_'+d.id,'1');
      renderEstimate(d);
    } else {
      errEl.textContent='That doesn\'t match. Try again, or contact the sender.';
      inp.classList.add('err');
    }
  };
  btn.addEventListener('click',submit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){submit();}inp.classList.remove('err');errEl.textContent='';});
}

// Try to extract phone from contact field, address, etc. (clientContact is freeform)
function extractPhone(d){
  const haystack=(d.clientContact||'')+' '+(d.clientAddr||'');
  const m=haystack.match(/[\d\s\-().+]{7,}/);
  return m?m[0]:'';
}
function extractEmail(d){
  const haystack=(d.clientContact||'')+' '+(d.clientAddr||'');
  const m=haystack.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  return m?m[0]:'';
}

function renderEstimate(d){
  const isInv=d.type==='invoice';
  const items=(d.lineItems||[]).filter(li=>(li.desc||'').trim());
  const total=calcTotal(d);
  const rows=items.map(li=>{
    const qty=parseFloat(li.qty)||0;
    const price=parseFloat(li.price)||0;
    if(qty===0){
      // Zero-qty: show description only, blank out qty/price/total
      return `<tr class="row-zero"><td>${esc(li.desc)}</td><td>—</td><td>—</td><td>—</td></tr>`;
    }
    return `<tr><td>${esc(li.desc)}</td><td>${li.qty}</td><td>${fmt(price)}</td><td>${fmt(qty*price)}</td></tr>`;
  }).join('');
  const alreadySigned=!!d.signature;
  const html=`
  <div class="head">
    <div class="company">
      <div class="company-name">${esc(COMPANY.name)}</div>
      <div class="company-tag">${esc(COMPANY.tagline)}</div>
      <div class="company-meta">${esc(COMPANY.phone)} · ${esc(COMPANY.email)}<br>${esc(COMPANY.address)}<br>${esc(COMPANY.license)}</div>
    </div>
    <div class="doc-info">
      <div class="doc-type">${isInv?'Invoice':'Estimate'}</div>
      <div class="doc-num">#${esc(d.num||'—')}</div>
      <div class="doc-date">Date: ${esc(d.date||'—')}</div>
      <div class="doc-date">${isInv?'Due':'Valid until'}: ${esc(d.dueDate||'—')}</div>
    </div>
  </div>
  <div class="body">
    ${alreadySigned?`<div class="signed-banner"><div class="signed-banner-icon">✅</div><div class="signed-banner-msg"><div class="signed-banner-title">This estimate has been signed</div><div class="signed-banner-detail">Signed by ${esc(d.signatureName||'')} on ${d.signatureDate?new Date(d.signatureDate).toLocaleString():''}</div></div></div>`:''}
    <div class="parties">
      <div><div class="party-lbl">From</div><div class="party-name">${esc(COMPANY.name)}</div><div class="party-detail">${esc(COMPANY.address)}<br>${esc(COMPANY.phone)}<br>${esc(COMPANY.email)}</div></div>
      <div><div class="party-lbl">${isInv?'Bill To':'Prepared For'}</div><div class="party-name">${esc(d.clientName||'')}</div><div class="party-detail">${esc(d.clientContact||'')}<br>${esc(d.clientAddr||'')}</div></div>
    </div>
    ${d.scope?`<div class="scope"><div class="scope-lbl">Scope of Work</div><div class="scope-text">${esc(d.scope)}</div></div>`:''}
    <table><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="4" style="color:#94a3b8;text-align:center;padding:16px">No line items</td></tr>'}</tbody></table>
    <div class="totals"><div class="total-row"><span class="total-lbl">TOTAL ${isInv?'DUE':''}</span><span>${fmt(total)}</span></div></div>
    ${d.notes?`<div class="notes"><div class="notes-lbl">Notes &amp; Terms</div><div class="notes-text">${esc(d.notes)}</div></div>`:''}
    ${alreadySigned?`<div class="embedded-sig"><div class="embedded-sig-lbl">Accepted &amp; Authorized By</div><div class="embedded-sig-row"><img class="embedded-sig-img" src="${d.signature}" alt="signature"/><div><div class="embedded-sig-name">${esc(d.signatureName||'')}</div><div class="embedded-sig-date">${d.signatureDate?new Date(d.signatureDate).toLocaleString():''}</div></div></div></div>`:''}
    ${(!isInv&&!alreadySigned)?`
      <div class="sig-section">
        <h2>✍️ Sign &amp; Accept</h2>
        <p>Sign below with your finger (mobile) or mouse (desktop) to accept this estimate. Once signed, the contractor will be notified.</p>
        <canvas class="sig-canvas" id="sigCanvas" width="800" height="160"></canvas>
        <div class="sig-row">
          <input class="sig-name-input" id="sigName" placeholder="Your printed name" autocomplete="name"/>
          <button class="sig-btn sig-btn-clear" id="sigClearBtn">Clear</button>
          <button class="sig-btn sig-btn-save" id="sigSaveBtn">✓ Sign &amp; Accept</button>
        </div>
        <div class="sig-status" id="sigStatus"></div>
      </div>`:''}
    <div class="actions">
      <button class="action-btn action-btn-print" onclick="window.print()">📄 Download / Print PDF</button>
    </div>
  </div>
  <div class="footer">${esc(COMPANY.name)} · ${esc(COMPANY.address)} · ${esc(COMPANY.website)}</div>`;
  document.getElementById('wrap').innerHTML=html;
  if(!isInv&&!alreadySigned) wireSignaturePad(d);
}

function wireSignaturePad(d){
  const canvas=document.getElementById('sigCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const fit=()=>{
    const rect=canvas.getBoundingClientRect();
    if(rect.width>0){
      const dpr=window.devicePixelRatio||1;
      canvas.width=Math.floor(rect.width*dpr);
      canvas.height=Math.floor(rect.height*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#000';
    }
  };
  fit();
  let drawing=false,lastX=0,lastY=0,hasInk=false;
  const pos=e=>{
    const r=canvas.getBoundingClientRect();
    const t=(e.touches&&e.touches[0])||e;
    return {x:t.clientX-r.left,y:t.clientY-r.top};
  };
  const start=e=>{e.preventDefault();drawing=true;const p=pos(e);lastX=p.x;lastY=p.y;};
  const move=e=>{
    if(!drawing)return;e.preventDefault();
    const p=pos(e);
    ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();
    lastX=p.x;lastY=p.y;hasInk=true;
  };
  const end=()=>{drawing=false;};
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);

  document.getElementById('sigClearBtn').addEventListener('click',()=>{
    ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.restore();
    hasInk=false;canvas.classList.remove('signed');
    document.getElementById('sigStatus').textContent='';
  });

  document.getElementById('sigSaveBtn').addEventListener('click',async()=>{
    const status=document.getElementById('sigStatus');
    if(!hasInk){status.textContent='Please draw your signature first.';status.className='sig-status err';return;}
    const name=document.getElementById('sigName').value.trim();
    if(!name){status.textContent='Please enter your printed name.';status.className='sig-status err';return;}
    const btn=document.getElementById('sigSaveBtn');
    btn.disabled=true;btn.textContent='Saving…';
    status.textContent='';status.className='sig-status';
    const dataUrl=canvas.toDataURL('image/png');
    const nowIso=new Date().toISOString();
    try{
      // Use HEAD to add Prefer: return=minimal so we don't accidentally read modified row
      const r=await fetch(`${SB_URL}/rest/v1/docs?id=eq.${encodeURIComponent(d.id)}`,{
        method:'PATCH',
        headers:{
          apikey:SB_KEY,
          Authorization:'Bearer '+SB_KEY,
          'Content-Type':'application/json',
          Prefer:'return=minimal'
        },
        body:JSON.stringify({
          signature:dataUrl,
          signature_name:name,
          signature_date:nowIso,
          status:'signed',
          outcome:'won',
          closed_date:nowIso
        })
      });
      if(!r.ok){const txt=await r.text();throw new Error('HTTP '+r.status+': '+txt);}
      // Update local view
      d.signature=dataUrl;d.signatureName=name;d.signatureDate=nowIso;
      renderEstimate(d);
      // Scroll to top to show banner
      window.scrollTo({top:0,behavior:'smooth'});
    }catch(e){
      console.error('Sign error:',e);
      status.textContent='Could not save signature. Please check your internet and try again.';
      status.className='sig-status err';
      btn.disabled=false;btn.textContent='✓ Sign & Accept';
    }
  });
}

(async()=>{
  const d=await loadDoc();
  if(!d) return;
  // Already verified in this session?
  if(sessionStorage.getItem('bvp_verified_'+d.id)){
    renderEstimate(d);
  } else {
    showGate(d);
  }
})();
</script>
</body>
